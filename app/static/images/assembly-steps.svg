<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="Assembly steps diagram">
  <rect width="960" height="420" fill="#ffffff"/>
  <g font-family="Arial, sans-serif">
    <text x="70" y="54" font-size="24" font-weight="700" fill="#222">Assembly overview</text>
    <text x="70" y="86" font-size="15" fill="#666">Use the labeled bolts, washers, brackets, and Allen key included in the package.</text>
  </g>
  <g transform="translate(70 125)">
    <rect width="220" height="210" rx="8" fill="#f5f1eb" stroke="#d0c5b8"/>
    <text x="20" y="34" font-family="Arial" font-size="18" font-weight="700" fill="#222">1. Prepare</text>
    <rect x="45" y="88" width="130" height="40" rx="5" fill="#b97a44"/>
    <path d="M38 130h144" stroke="#6f4525" stroke-width="10" stroke-linecap="round"/>
    <text x="20" y="172" font-family="Arial" font-size="14" fill="#555">Place tabletop upside down.</text>
  </g>
  <g transform="translate(370 125)">
    <rect width="220" height="210" rx="8" fill="#f5f1eb" stroke="#d0c5b8"/>
    <text x="20" y="34" font-family="Arial" font-size="18" font-weight="700" fill="#222">2. Attach legs</text>
    <rect x="42" y="72" width="136" height="24" rx="4" fill="#b97a44"/>
    <path d="M58 96l-17 75h30l9-75z" fill="#86522d"/>
    <path d="M150 96l17 75h-30l-9-75z" fill="#86522d"/>
    <circle cx="78" cy="108" r="6" fill="#333"/>
    <circle cx="142" cy="108" r="6" fill="#333"/>
    <text x="20" y="172" font-family="Arial" font-size="14" fill="#555">Hand-thread bolts first.</text>
  </g>
  <g transform="translate(670 125)">
    <rect width="220" height="210" rx="8" fill="#f5f1eb" stroke="#d0c5b8"/>
    <text x="20" y="34" font-family="Arial" font-size="18" font-weight="700" fill="#222">3. Tighten</text>
    <rect x="42" y="72" width="136" height="24" rx="4" fill="#b97a44"/>
    <path d="M58 96l-14 75h28l8-75z" fill="#86522d"/>
    <path d="M150 96l14 75h-28l-8-75z" fill="#86522d"/>
    <path d="M74 112h75" stroke="#333" stroke-width="5" stroke-linecap="round"/>
    <path d="M149 112l-13-10m13 10l-13 10" stroke="#333" stroke-width="5" stroke-linecap="round"/>
    <text x="20" y="172" font-family="Arial" font-size="14" fill="#555">Tighten diagonally, then turn upright.</text>
  </g>
</svg>
